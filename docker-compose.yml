services:
  wisave-expenses-webapi:
    build:
      context: .
      dockerfile: Dockerfile.WebApi
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=wisave_expenses;Username=wisave;Password=wisave_dev
      - RabbitMq__Host=host.docker.internal
      - RabbitMq__VirtualHost=expenses

  worker-domain:
    build:
      context: .
      dockerfile: Dockerfile.Worker.Domain
    depends_on:
      - kurrentdb
      - postgres
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=wisave_expenses;Username=wisave;Password=wisave_dev
      - ConnectionStrings__EventStore=esdb://kurrentdb:2113?tls=false
      - RabbitMq__Host=host.docker.internal
      - RabbitMq__VirtualHost=expenses
      - KurrentForwarder__GroupName=expenses-forwarder
      - KurrentForwarder__FromStartWhenCreated=true
      - KurrentForwarder__MaxSubscriberCount=1
      - KurrentForwarder__ConsumerStrategyName=DispatchToSingle

  worker-projections:
    build:
      context: .
      dockerfile: Dockerfile.Worker.Projections
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=wisave_expenses;Username=wisave;Password=wisave_dev
      - RabbitMq__Host=host.docker.internal
      - RabbitMq__VirtualHost=expenses

  kurrentdb:
    image: eventstore/eventstore:24.10
    ports:
      - "2113:2113"
    environment:
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
      - EVENTSTORE_MEM_DB=false
    volumes:
      - kurrentdb-data:/var/lib/eventstore

  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=wisave_expenses
      - POSTGRES_USER=wisave
      - POSTGRES_PASSWORD=wisave_dev
    volumes:
      - expenses-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisave -d wisave_expenses"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kurrentdb-data:
  expenses-db:

networks:
  default:
    external: true
    name: wisave-net
